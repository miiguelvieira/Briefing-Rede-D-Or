<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login · Portal de Atendimento Rede D'Or</title>
  <link rel="stylesheet" href="assets/css/shared.css" />
  <style>
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
    }
    .page-wrap {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 32px 24px;
    }
    .logo-area { text-align: center; margin-bottom: 32px; }
    .badge {
      display: inline-block; background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius-full); padding: 6px 16px; font-size: 11px; letter-spacing: .08em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 16px;
    }
    .logo-area h1 {
      font-size: clamp(1.4rem, 3.5vw, 2rem); font-weight: 800; letter-spacing: -.02em;
      background: linear-gradient(135deg, #e8eaf6 30%, #8892b0);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .logo-area p { color: var(--muted); font-size: .9rem; margin-top: 8px; }

    .login-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 36px; width: 100%; max-width: 420px;
    }
    .login-card h2 { font-size: 1.15rem; font-weight: 700; margin-bottom: 4px; }
    .login-card .sub { color: var(--muted); font-size: .87rem; margin-bottom: 24px; }

    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    label { font-size: .82rem; font-weight: 600; color: var(--muted); }
    input {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 14px;
      color: var(--text); font-size: .93rem; font-family: inherit;
      outline: none; transition: border-color .15s, box-shadow .15s; width: 100%;
    }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    input::placeholder { color: var(--muted); opacity: .6; }

    .btn-login {
      width: 100%; padding: 13px; border-radius: 10px; border: none;
      background: var(--accent); color: #fff; font-size: .95rem; font-weight: 700;
      font-family: inherit; cursor: pointer; transition: all .18s;
      box-shadow: 0 4px 20px rgba(168,85,247,.35); margin-top: 4px;
    }
    .btn-login:hover { filter: brightness(1.1); transform: translateY(-1px); }

    .error-msg {
      display: none; background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.35);
      border-radius: 8px; padding: 10px 14px; color: #ef4444;
      font-size: .85rem; margin-top: 12px; text-align: center;
    }
    .error-msg.show { display: block; }

    .row-links {
      display: flex; justify-content: space-between; align-items: center; margin-top: 18px;
    }
    .row-links a { color: var(--muted); font-size: .83rem; text-decoration: none; transition: color .15s; }
    .row-links a:hover { color: var(--text); }
    .row-links a.highlight { color: var(--accent); font-weight: 600; }
    .divider { border: none; border-top: 1px solid var(--border); margin: 22px 0; }


    footer { text-align: center; padding: 20px; color: var(--muted); font-size: .78rem; border-top: 1px solid var(--border); }
  </style>
</head>
<body>

  <nav class="main-nav" id="mainNav"></nav>

  <div class="page-wrap">
    <div class="logo-area">
      <div class="badge">Rede D'Or · Portal de Atendimento</div>
      <h1>Acesse sua conta</h1>
      <p>Acompanhe suas solicitações em tempo real</p>
    </div>

    <div class="login-card">
      <h2>Entrar</h2>
      <p class="sub">Use seu e-mail corporativo para continuar</p>

      <form id="loginForm" novalidate>
        <div class="field">
          <label for="email">E-mail</label>
          <input type="email" id="email" placeholder="seu@rededor.com.br" autocomplete="email" />
        </div>
        <div class="field">
          <label for="password">Senha</label>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
        </div>

        <button type="submit" class="btn-login">Entrar</button>
        <div class="error-msg" id="errorMsg">E-mail ou senha incorretos. Tente novamente.</div>
      </form>

      <div class="row-links">
        <a href="recuperar-senha.html">Esqueci minha senha</a>
        <a href="cadastro.html" class="highlight">Criar conta →</a>
      </div>

    </div>
  </div>

  <footer>&copy; 2026 Rede D'Or · Central de Atendimento</footer>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="assets/js/firebase-config.js"></script>
<script src="assets/js/utils.js"></script>
<script src="assets/js/seed.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/nav.js"></script>
<script>
  (async () => {
    await redirectIfLoggedIn();
    initNav('login');
  })();

  document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const email    = document.getElementById('email').value.trim().toLowerCase();
    const password = document.getElementById('password').value;
    const errorEl  = document.getElementById('errorMsg');
    const btn      = document.querySelector('.btn-login');

    btn.disabled = true;
    btn.textContent = 'Entrando...';
    errorEl.classList.remove('show');

    try {
      // Wait for seed to finish before signing in — prevents seed's signOut
      // from kicking out the user's freshly created session (race condition)
      if (window._seedPromise) await window._seedPromise;

      const cred = await auth.signInWithEmailAndPassword(email, password);
      // Fetch profile directly — _authReady already resolved null at page load
      // and awaiting it again would return that stale null even after signIn
      const doc = await db.collection('users').doc(cred.user.uid).get();
      if (!doc.exists) {
        await auth.signOut();
        throw new Error('E-mail ou senha incorretos. Tente novamente.');
      }
      const data = doc.data();
      if (data.active === false) {
        await auth.signOut();
        throw new Error('Conta desativada. Entre em contato com o administrador.');
      }
      // Update currentSession so guardAuth works on the next page
      window.currentSession = {
        uid: cred.user.uid, userId: data.numericId, role: data.role,
        sector: data.sector || null, name: data.name, email: data.email,
        department: data.department, initials: data.initials || data.name.slice(0, 2).toUpperCase(),
        active: data.active !== false,
      };
      window.location.href = data.role === 'user' ? 'portal.html' : 'painel.html';
    } catch (err) {
      const authErrors = ['auth/invalid-credential','auth/wrong-password','auth/user-not-found','auth/invalid-email','auth/too-many-requests'];
      errorEl.textContent = authErrors.includes(err.code)
        ? 'E-mail ou senha incorretos. Tente novamente.'
        : (err.message || 'Erro ao entrar. Tente novamente.');
      errorEl.classList.add('show');
      document.getElementById('password').value = '';
      btn.disabled = false;
      btn.textContent = 'Entrar';
    }
  });

  ['email', 'password'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => {
      document.getElementById('errorMsg').classList.remove('show');
    });
  });
</script>
</body>
</html>
