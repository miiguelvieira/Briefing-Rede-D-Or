<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meus Chamados · Portal Rede D'Or</title>
  <link rel="stylesheet" href="assets/css/shared.css" />
  <style>
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

    /* TOPBAR */
    .topbar {
      position: sticky; top: var(--nav-h); z-index: 100;
      background: rgba(15,17,23,.9); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 16px; padding: 10px 24px;
    }
    .search-wrap { flex: 1; max-width: 360px; position: relative; }
    .search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
    #searchInput {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 9px 12px 9px 36px;
      color: var(--text); font-size: .88rem; font-family: inherit; outline: none;
      transition: border-color .15s;
    }
    #searchInput:focus { border-color: var(--accent); }
    #searchInput::placeholder { color: var(--muted); opacity: .6; }

    /* PAGE */
    .page { max-width: 800px; margin: 0 auto; padding: 32px 24px 80px; }
    .page-header { margin-bottom: 28px; }
    .page-header h1 { font-size: 1.6rem; font-weight: 800; letter-spacing: -.02em; }
    .page-header p { color: var(--muted); font-size: .9rem; margin-top: 6px; }

    /* FILTER BAR */
    .filter-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
    .filter-label { font-size: .8rem; color: var(--muted); font-weight: 600; flex-shrink: 0; }
    .pills { display: flex; gap: 6px; flex-wrap: wrap; }
    .pill {
      padding: 6px 14px; border-radius: var(--radius-full); border: 1px solid var(--border);
      background: var(--surface); color: var(--muted); font-size: .82rem; font-weight: 600;
      cursor: pointer; transition: all .15s; white-space: nowrap;
    }
    .pill:hover { border-color: var(--accent); color: var(--text); }
    .pill.active { background: var(--accent-bg); border-color: var(--accent); color: var(--accent); }
    .sort-wrap { margin-left: auto; }
    .sort-wrap select {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 7px 12px; color: var(--text);
      font-size: .82rem; font-family: inherit; outline: none; cursor: pointer;
    }
    .sort-wrap select option { background: var(--surface2); }

    /* TICKET CARDS */
    .tickets-list { display: flex; flex-direction: column; gap: 12px; }
    .ticket-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-md); padding: 20px; cursor: pointer;
      transition: border-color .18s, box-shadow .18s, transform .18s;
    }
    .ticket-card:hover { transform: translateY(-2px); }
    .ticket-card.art:hover { border-color: var(--art); box-shadow: 0 8px 30px var(--art-bg); }
    .ticket-card.evt:hover { border-color: var(--evt); box-shadow: 0 8px 30px var(--evt-bg); }
    .ticket-card.pat:hover { border-color: var(--pat); box-shadow: 0 8px 30px var(--pat-bg); }

    .card-top { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; flex-wrap: wrap; }
    .protocol-id { font-family: monospace; font-size: .88rem; font-weight: 700; letter-spacing: .04em; }
    .protocol-id.art { color: var(--art); }
    .protocol-id.evt { color: var(--evt); }
    .protocol-id.pat { color: var(--pat); }
    .card-title { font-size: .97rem; font-weight: 600; margin-bottom: 10px; line-height: 1.4; }
    .card-meta { display: flex; gap: 20px; flex-wrap: wrap; }
    .meta-item { font-size: .8rem; color: var(--muted); }
    .meta-item span { color: var(--text); font-weight: 600; }

    /* EMPTY STATE */
    .empty-state { text-align: center; padding: 80px 24px; color: var(--muted); }
    .empty-state svg { color: var(--border); margin-bottom: 16px; }
    .empty-state h3 { font-size: 1.1rem; font-weight: 700; color: var(--text); margin-bottom: 8px; }
    .empty-state p { font-size: .9rem; }

    /* DETAIL OVERLAY */
    .overlay {
      display: none; position: fixed; inset: 0; z-index: 600;
      background: rgba(0,0,0,.7); backdrop-filter: blur(4px);
      align-items: flex-start; justify-content: flex-end;
    }
    .overlay.open { display: flex; }
    .detail-panel {
      width: min(560px, 100vw); height: 100vh; overflow-y: auto;
      background: var(--surface); border-left: 1px solid var(--border);
      display: flex; flex-direction: column; animation: slideIn .25s ease;
    }
    @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    .detail-header {
      position: sticky; top: 0; background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 20px 24px; display: flex; align-items: center; gap: 12px;
    }
    .detail-header h2 { font-size: 1.05rem; font-weight: 700; flex: 1; }
    .btn-close {
      background: none; border: none; color: var(--muted); cursor: pointer;
      display: flex; align-items: center; padding: 6px; border-radius: 8px;
      transition: color .15s, background .15s;
    }
    .btn-close:hover { color: var(--text); background: var(--surface2); }
    .detail-body { padding: 24px; flex: 1; }
    .detail-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 28px; }
    .info-item { display: flex; flex-direction: column; gap: 4px; }
    .info-item .info-label { font-size: .75rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; font-weight: 600; }
    .info-item .info-value { font-size: .92rem; font-weight: 600; color: var(--text); }
    .section-title {
      font-size: .72rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border);
    }

    /* TIMELINE */
    .timeline { display: flex; flex-direction: column; }
    .timeline-item { display: flex; gap: 16px; padding-bottom: 24px; }
    .timeline-item:last-child { padding-bottom: 0; }
    .timeline-left { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
    .timeline-dot { width: 10px; height: 10px; border-radius: 50%; border: 2px solid var(--accent); background: var(--bg); flex-shrink: 0; margin-top: 4px; }
    .timeline-line { width: 2px; background: var(--border); flex: 1; margin-top: 4px; }
    .timeline-item:last-child .timeline-line { display: none; }
    .timeline-content { flex: 1; }
    .timeline-date { font-size: .77rem; color: var(--muted); margin-bottom: 4px; }
    .timeline-status { font-size: .8rem; font-weight: 700; margin-bottom: 4px; }
    .timeline-note { font-size: .88rem; color: var(--muted); line-height: 1.5; }
    .timeline-author { font-size: .77rem; color: var(--muted); margin-top: 4px; font-style: italic; }

    /* COMMENTS */
    .comment-form { margin-top: 20px; margin-bottom: 8px; }
    .comment-form textarea {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 11px 14px; color: var(--text);
      font-size: .93rem; font-family: inherit; outline: none;
      transition: border-color .15s; resize: vertical; min-height: 80px; box-sizing: border-box;
    }
    .comment-form textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    .comment-attach { display: flex; align-items: center; gap: 10px; margin: 8px 0; }
    .btn-attach {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 13px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--surface2); color: var(--muted); font-size: .82rem; font-weight: 600;
      cursor: pointer; transition: all .15s; white-space: nowrap;
    }
    .btn-attach:hover { border-color: var(--accent); color: var(--accent); }
    .btn-attach input[type="file"] { display: none; }
    .file-name-label { font-size: .8rem; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 180px; }
    .btn-send-comment {
      width: 100%; padding: 11px; border-radius: 10px; border: none;
      background: var(--accent); color: #fff; font-size: .93rem; font-weight: 700;
      font-family: inherit; cursor: pointer; transition: all .18s;
      box-shadow: 0 4px 16px rgba(168,85,247,.3); margin-top: 4px;
    }
    .btn-send-comment:hover { filter: brightness(1.1); }
    .btn-send-comment:disabled { opacity: .5; cursor: not-allowed; filter: none; }
    .comments-list { margin-top: 12px; display: flex; flex-direction: column; gap: 10px; }
    .comment-item {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 14px;
    }
    .comment-meta { display: flex; gap: 10px; align-items: baseline; margin-bottom: 6px; flex-wrap: wrap; }
    .comment-author { font-size: .8rem; font-weight: 700; color: var(--text); }
    .comment-role { font-size: .72rem; color: var(--muted); }
    .comment-date { font-size: .75rem; color: var(--muted); margin-left: auto; }
    .comment-text { font-size: .88rem; color: var(--muted); line-height: 1.5; white-space: pre-wrap; }
    .comment-attachment { margin-top: 8px; }
    .comment-attachment a {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: .8rem; color: var(--accent); text-decoration: none;
      background: var(--accent-bg); border: 1px solid rgba(168,85,247,.2);
      border-radius: 6px; padding: 4px 10px;
    }
    .comment-attachment a:hover { text-decoration: underline; }
    .comments-empty { font-size: .85rem; color: var(--muted); text-align: center; padding: 16px 0; }

    @media (max-width: 580px) {
      .topbar { padding: 10px 16px; }
      .search-wrap { max-width: none; flex: 1; }
      .filter-bar { gap: 8px; }
      .card-meta { gap: 12px; }
      .detail-info-grid { grid-template-columns: 1fr; }
      .page { padding: 24px 16px 60px; }
    }
  </style>
</head>
<body>

  <nav class="main-nav" id="mainNav"></nav>

  <div class="topbar">
    <div class="search-wrap">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Buscar por protocolo (ART-...)" />
    </div>
  </div>

  <div class="page">
    <div class="page-header">
      <h1>Meus Chamados</h1>
      <p id="ticketCount">Carregando...</p>
    </div>

    <div class="filter-bar">
      <span class="filter-label">Status</span>
      <div class="pills" id="statusPills">
        <button class="pill active" data-status="todos">Todos</button>
        <button class="pill" data-status="aberto">Aberto</button>
        <button class="pill" data-status="em_andamento">Em Andamento</button>
        <button class="pill" data-status="resolvido">Resolvido</button>
      </div>
      <div class="sort-wrap">
        <select id="sortSelect">
          <option value="createdAt_desc">Mais recente</option>
          <option value="createdAt_asc">Mais antigo</option>
          <option value="updatedAt_desc">Última atualização</option>
          <option value="priority_desc">Prioridade</option>
        </select>
      </div>
    </div>

    <div class="tickets-list" id="ticketsList"></div>
  </div>

  <!-- DETAIL OVERLAY -->
  <div class="overlay" id="detailOverlay">
    <div class="detail-panel" id="detailPanel">
      <div class="detail-header">
        <div>
          <div id="detailProtocol" class="protocol-id" style="font-size:1rem;margin-bottom:4px;"></div>
          <h2 id="detailTitle"></h2>
        </div>
        <button class="btn-close" id="btnClose">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M18 6 6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <div class="detail-body">
        <div class="detail-info-grid" id="detailInfoGrid"></div>
        <div class="section-title">Histórico do Chamado</div>
        <div class="timeline" id="detailTimeline"></div>

        <div class="section-title" style="margin-top:28px;">Comentários</div>
        <div class="comments-list" id="commentsList">
          <div class="comments-empty">Carregando comentários...</div>
        </div>
        <div class="comment-form" id="commentForm">
          <textarea id="commentText" placeholder="Escreva um comentário ou adicione uma observação..."></textarea>
          <div class="comment-attach">
            <label class="btn-attach">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
              Anexar arquivo
              <input type="file" id="commentFile" accept="image/*,.pdf,.doc,.docx,.xls,.xlsx,.zip" />
            </label>
            <span class="file-name-label" id="commentFileName"></span>
          </div>
          <button class="btn-send-comment" id="btnSendComment">Enviar comentário</button>
        </div>
      </div>
    </div>
  </div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>
<script src="assets/js/firebase-config.js"></script>
<script src="assets/js/utils.js"></script>
<script src="assets/js/seed.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/nav.js"></script>
<script>
/* ─── ASYNC INIT ──────────────────────────────────────────────────────────── */
let session;
(async () => {
  session = await guardAuth('user');
  if (!session) return;
  await loadData();
  initNav('portal');
  render();
})();

/* ─── STATE ───────────────────────────────────────────────────────────────── */
let currentStatus = 'todos';
let currentSort   = 'createdAt_desc';
let searchQuery   = '';

/* ─── EVENTS ──────────────────────────────────────────────────────────────── */
document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value.trim().toUpperCase();
  render();
});

document.getElementById('statusPills').addEventListener('click', e => {
  if (!e.target.classList.contains('pill')) return;
  document.querySelectorAll('#statusPills .pill').forEach(p => p.classList.remove('active'));
  e.target.classList.add('active');
  currentStatus = e.target.dataset.status;
  render();
});

document.getElementById('sortSelect').addEventListener('change', e => {
  currentSort = e.target.value;
  render();
});

/* ─── RENDER TICKETS ──────────────────────────────────────────────────────── */
function getUserTickets() {
  return getTickets().filter(t => t.userId === session.userId);
}

function sortTickets(tickets) {
  return [...tickets].sort((a, b) => {
    if (currentSort === 'createdAt_desc') return new Date(b.createdAt) - new Date(a.createdAt);
    if (currentSort === 'createdAt_asc')  return new Date(a.createdAt) - new Date(b.createdAt);
    if (currentSort === 'updatedAt_desc') return new Date(b.updatedAt) - new Date(a.updatedAt);
    if (currentSort === 'priority_desc')  return (PRIORITY_ORDER[a.priority] ?? 3) - (PRIORITY_ORDER[b.priority] ?? 3);
    return 0;
  });
}

function render() {
  let tickets = getUserTickets();
  const total = tickets.length;

  if (currentStatus !== 'todos') tickets = tickets.filter(t => t.status === currentStatus);
  if (searchQuery) tickets = tickets.filter(t => t.id.includes(searchQuery) || t.title.toUpperCase().includes(searchQuery));
  tickets = sortTickets(tickets);

  document.getElementById('ticketCount').textContent =
    `${total} chamado${total !== 1 ? 's' : ''} no total · exibindo ${tickets.length}`;

  const list = document.getElementById('ticketsList');

  if (tickets.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M9 12h6m-3-3v6M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0z"/>
        </svg>
        <h3>Nenhum chamado encontrado</h3>
        <p>Tente ajustar os filtros ou a busca acima.</p>
      </div>`;
    return;
  }

  list.innerHTML = tickets.map(t => `
    <div class="ticket-card ${t.type.toLowerCase()}" data-id="${t.id}">
      <div class="card-top">
        <span class="protocol-id ${t.type.toLowerCase()}">${t.id}</span>
        <span class="type-pill ${t.type.toLowerCase()}">${t.type}</span>
        <span class="status-badge ${t.status}">${statusLabel(t.status)}</span>
        <span class="priority-badge ${t.priority}">${priorityLabel(t.priority)}</span>
      </div>
      <div class="card-title">${t.title}</div>
      <div class="card-meta">
        <div class="meta-item">Aberto: <span>${fmtDate(t.createdAt)}</span></div>
        <div class="meta-item">Atualizado: <span>${fmtDate(t.updatedAt)}</span></div>
        ${t.deadline ? `<div class="meta-item">Prazo: <span>${fmtDate(t.deadline)}</span></div>` : ''}
        ${t.resolvedAt ? `<span class="sla-badge ${t.slaStatus}">${slaLabel(t.slaStatus)}</span>` : ''}
      </div>
    </div>
  `).join('');

  list.querySelectorAll('.ticket-card').forEach(card => {
    card.addEventListener('click', () => openDetail(card.dataset.id));
  });
}

/* ─── DETAIL PANEL ────────────────────────────────────────────────────────── */
function openDetail(id) {
  const t = getTickets().find(x => x.id === id);
  if (!t) return;

  const typeClass = t.type.toLowerCase();
  document.getElementById('detailProtocol').className = `protocol-id ${typeClass}`;
  document.getElementById('detailProtocol').textContent = t.id;
  document.getElementById('detailTitle').textContent = t.title;

  document.getElementById('detailInfoGrid').innerHTML = `
    <div class="info-item"><span class="info-label">Tipo</span><span class="info-value">${typeLabel(t.type)}</span></div>
    <div class="info-item"><span class="info-label">Status</span><span class="info-value"><span class="status-badge ${t.status}">${statusLabel(t.status)}</span></span></div>
    <div class="info-item"><span class="info-label">Prioridade</span><span class="info-value"><span class="priority-badge ${t.priority}">${priorityLabel(t.priority)}</span></span></div>
    <div class="info-item"><span class="info-label">Analista</span><span class="info-value">${getUserName(t.analystId)}</span></div>
    <div class="info-item"><span class="info-label">Aberto em</span><span class="info-value">${fmtDateTime(t.createdAt)}</span></div>
    <div class="info-item"><span class="info-label">Última atualização</span><span class="info-value">${fmtDateTime(t.updatedAt)}</span></div>
    ${t.deadline ? `<div class="info-item"><span class="info-label">Prazo</span><span class="info-value">${fmtDate(t.deadline)}</span></div>` : ''}
    ${t.resolvedAt ? `
    <div class="info-item"><span class="info-label">Resolvido em</span><span class="info-value">${fmtDateTime(t.resolvedAt)}</span></div>
    <div class="info-item"><span class="info-label">SLA</span><span class="info-value"><span class="sla-badge ${t.slaStatus}">${slaLabel(t.slaStatus)}</span></span></div>` : ''}
  `;

  const history = [...(t.history || [])].reverse();
  document.getElementById('detailTimeline').innerHTML = history.map(h => `
    <div class="timeline-item">
      <div class="timeline-left">
        <div class="timeline-dot"></div>
        <div class="timeline-line"></div>
      </div>
      <div class="timeline-content">
        <div class="timeline-date">${fmtDateTime(h.date)}</div>
        <div class="timeline-status"><span class="status-badge ${h.status}">${statusLabel(h.status)}</span></div>
        <div class="timeline-note">${h.note}</div>
        <div class="timeline-author">por ${h.author}</div>
      </div>
    </div>
  `).join('');

  _currentDetailId = id;
  document.getElementById('commentText').value = '';
  document.getElementById('commentFile').value = '';
  document.getElementById('commentFileName').textContent = '';
  document.getElementById('detailOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  loadComments(id);
}

function closeDetail() {
  document.getElementById('detailOverlay').classList.remove('open');
  document.body.style.overflow = '';
  _currentDetailId = null;
}

document.getElementById('btnClose').addEventListener('click', closeDetail);
document.getElementById('detailOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('detailOverlay')) closeDetail();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });

/* ─── COMMENTS ────────────────────────────────────────────────────────────── */
let _currentDetailId = null;

async function loadComments(ticketId) {
  const list = document.getElementById('commentsList');
  list.innerHTML = '<div class="comments-empty">Carregando...</div>';
  try {
    const snap = await db.collection('tickets').doc(ticketId)
      .collection('comments').orderBy('date', 'asc').get();
    if (snap.empty) {
      list.innerHTML = '<div class="comments-empty">Nenhum comentário ainda.</div>';
      return;
    }
    list.innerHTML = snap.docs.map(d => {
      const c = d.data();
      const att = c.attachment
        ? `<div class="comment-attachment"><a href="${c.attachment.url}" target="_blank" rel="noopener">
             <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
             ${c.attachment.name}</a></div>` : '';
      return `<div class="comment-item">
        <div class="comment-meta">
          <span class="comment-author">${c.author}</span>
          <span class="comment-role">${c.role === 'admin' ? 'Admin' : c.role === 'analyst' ? 'Analista' : 'Usuário'}</span>
          <span class="comment-date">${fmtDateTime(c.date)}</span>
        </div>
        <div class="comment-text">${c.text.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
        ${att}
      </div>`;
    }).join('');
  } catch(e) {
    list.innerHTML = '<div class="comments-empty">Erro ao carregar comentários.</div>';
  }
}

document.getElementById('commentFile').addEventListener('change', e => {
  const f = e.target.files[0];
  document.getElementById('commentFileName').textContent = f ? f.name : '';
});

document.getElementById('btnSendComment').addEventListener('click', async () => {
  const ticketId = _currentDetailId;
  if (!ticketId) return;
  const text = document.getElementById('commentText').value.trim();
  if (!text) { document.getElementById('commentText').style.borderColor = '#ef4444'; return; }
  document.getElementById('commentText').style.borderColor = '';

  const btn = document.getElementById('btnSendComment');
  btn.disabled = true;
  btn.textContent = 'Enviando...';

  try {
    let attachment = null;
    const fileInput = document.getElementById('commentFile');
    const file = fileInput.files[0];
    if (file) {
      const path = `attachments/${ticketId}/${Date.now()}_${file.name}`;
      const ref = storage.ref(path);
      await ref.put(file);
      const url = await ref.getDownloadURL();
      attachment = { name: file.name, url };
    }

    const comment = {
      author:     session.name,
      authorId:   session.userId,
      role:       session.role,
      date:       new Date().toISOString(),
      text,
      attachment,
    };

    await db.collection('tickets').doc(ticketId).collection('comments').add(comment);
    document.getElementById('commentText').value = '';
    fileInput.value = '';
    document.getElementById('commentFileName').textContent = '';
    await loadComments(ticketId);
  } catch(e) {
    alert('Erro ao enviar comentário. Verifique se o Firebase Storage está ativado.');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Enviar comentário';
  }
});
</script>
</body>
</html>
